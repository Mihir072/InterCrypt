# ================================================
# IntelCrypt - Secure Messaging Platform Configuration
# ================================================
# WARNING: This file contains sensitive configuration.
# In production, use environment variables or external vault.
# ================================================

# Application
spring.application.name=IntelCrypt
server.port=${PORT:8443}

# File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# SSL/TLS Configuration (Enable in production)
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=intelcrypt

# Database Configuration - PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/intelcrypt}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mihir@716}

# H2 Console (disabled for PostgreSQL)
spring.h2.console.enabled=false

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ================================================
# SECURITY CONFIGURATION
# ================================================

# JWT Configuration
# CRITICAL: Replace with strong secrets in production via environment variables
intelcrypt.jwt.secret=${JWT_SECRET:REPLACE_WITH_256_BIT_SECRET_KEY_IN_PRODUCTION_ENVIRONMENT_VARIABLE}
intelcrypt.jwt.expiration-ms=900000
intelcrypt.jwt.refresh-expiration-ms=86400000

# ================================================
# CRYPTOGRAPHY CONFIGURATION
# ================================================

# AES Configuration
intelcrypt.crypto.aes.default-key-size=256
intelcrypt.crypto.aes.default-mode=GCM
intelcrypt.crypto.aes.gcm-tag-length=128
intelcrypt.crypto.aes.iteration-rounds=1

# RSA Configuration
intelcrypt.crypto.rsa.key-size=4096

# ECC Configuration
intelcrypt.crypto.ecc.curve=secp384r1

# Key Rotation
intelcrypt.crypto.key-rotation.enabled=true
intelcrypt.crypto.key-rotation.interval-days=30

# ================================================
# MESSAGING CONFIGURATION
# ================================================

# Message Settings
intelcrypt.messaging.default-expiration-hours=24
intelcrypt.messaging.max-attachment-size-mb=25
intelcrypt.messaging.enable-steganography=false

# ================================================
# SECURITY DEFENSE CONFIGURATION
# ================================================

# Rate Limiting
intelcrypt.security.rate-limit.requests-per-minute=60
intelcrypt.security.rate-limit.login-attempts=5
intelcrypt.security.rate-limit.lockout-duration-minutes=15

# Honeypot Configuration
intelcrypt.security.honeypot.enabled=true
intelcrypt.security.honeypot.fake-endpoints=/api/admin/config,/api/debug/keys,/api/internal/secrets

# Intrusion Detection
intelcrypt.security.intrusion.enabled=true
intelcrypt.security.intrusion.alert-threshold=3
intelcrypt.security.intrusion.spam-injection=true

# ================================================
# AUDIT LOGGING
# ================================================

intelcrypt.audit.enabled=true
intelcrypt.audit.log-encryption-events=true
intelcrypt.audit.log-key-usage=true
intelcrypt.audit.tamper-protection=true

# ================================================
# ACTUATOR (Disabled in production)
# ================================================

management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health

# ================================================
# OPENAPI/SWAGGER (Disable in production)
# ================================================

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/api-docs

# Logging
logging.level.com.intelcrypt=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
