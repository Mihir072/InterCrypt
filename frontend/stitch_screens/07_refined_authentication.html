<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>IntelCrypt | Secure Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#00f2ff", // Electric Cyan for button
                "sec-blue": "#1e2a38", // Deep Security Blue
                "background-light": "#f6f7f7",
                "background-dark": "#0a0c10",
              },
              fontFamily: {
                "display": ["Space Grotesk", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">
<!-- Main Container -->
<div class="relative w-full max-w-md overflow-hidden rounded-xl border border-sec-blue/30 bg-sec-blue/10 backdrop-blur-xl shadow-2xl">
<!-- Top App Bar / Header -->
<div class="flex items-center p-6 justify-between border-b border-sec-blue/20">
<div class="text-primary flex size-10 shrink-0 items-center justify-center rounded-lg bg-primary/10">
<span class="material-symbols-outlined">shield_lock</span>
</div>
<h2 class="text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">IntelCrypt Vault</h2>
</div>
<!-- Hero / Visual Area -->
<div class="px-6 pt-8 pb-4">
<div class="relative w-full aspect-video rounded-xl overflow-hidden bg-gradient-to-br from-sec-blue to-background-dark border border-sec-blue/40 flex items-center justify-center group" data-alt="Cybersecurity digital shield with blue light patterns">
<div class="absolute inset-0 opacity-40 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/30 via-transparent to-transparent"></div>
<span class="material-symbols-outlined text-6xl text-primary/80">fingerprint</span>
</div>
</div>
<!-- Content -->
<div class="px-6 text-center">
<h1 class="text-slate-100 text-3xl font-bold leading-tight pt-4">Secure Access</h1>
<p class="text-slate-400 text-sm font-normal leading-normal mt-2">Initialize biometric or ID authentication</p>
</div>
<!-- Form Area -->
<div class="p-6 space-y-4">
<!-- Secure ID Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-300 text-xs font-semibold uppercase tracking-wider ml-1">Secure Enterprise ID</label>
<div class="flex items-center rounded-xl border border-sec-blue/50 bg-background-dark/50 focus-within:border-primary/50 transition-colors">
<input class="form-input w-full border-none bg-transparent text-slate-100 placeholder:text-slate-500 focus:ring-0 p-4 text-base" placeholder="Enter terminal ID" type="text"/>
<div class="pr-4 text-slate-500">
<span class="material-symbols-outlined">person</span>
</div>
</div>
</div>
<!-- Vault Key Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-300 text-xs font-semibold uppercase tracking-wider ml-1">Vault Recovery Key</label>
<div class="flex items-center rounded-xl border border-sec-blue/50 bg-background-dark/50 focus-within:border-primary/50 transition-colors">
<input class="form-input w-full border-none bg-transparent text-slate-100 placeholder:text-slate-500 focus:ring-0 p-4 text-base" placeholder="••••••••••••" type="password"/>
<div class="pr-4 text-slate-500">
<span class="material-symbols-outlined">key</span>
</div>
</div>
</div>
<!-- Biometric Focus Options -->
<div class="flex items-center justify-center gap-6 py-4">
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 flex items-center justify-center rounded-full border border-sec-blue/40 bg-sec-blue/20 text-slate-400 group-hover:text-primary group-hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-3xl">face</span>
</div>
<span class="text-[10px] text-slate-500 font-medium uppercase tracking-tighter">Face ID</span>
</button>
<div class="h-8 w-px bg-sec-blue/30"></div>
<button class="flex flex-col items-center gap-2 group">
<div class="size-14 flex items-center justify-center rounded-full border border-sec-blue/40 bg-sec-blue/20 text-slate-400 group-hover:text-primary group-hover:border-primary/50 transition-all">
<span class="material-symbols-outlined text-3xl">fingerprint</span>
</div>
<span class="text-[10px] text-slate-500 font-medium uppercase tracking-tighter">Fingerprint</span>
</button>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary text-background-dark font-bold text-lg rounded-xl shadow-[0_0_20px_rgba(0,242,255,0.3)] hover:shadow-[0_0_30px_rgba(0,242,255,0.5)] transition-all active:scale-95 flex items-center justify-center gap-2">
<span>INITIALIZE LOGIN</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Links -->
<div class="flex justify-between items-center text-xs text-slate-500 pt-2 px-1">
<a class="hover:text-primary transition-colors" href="#">Forgot Access ID?</a>
<a class="hover:text-primary transition-colors" href="#">Emergency Offline Mode</a>
</div>
</div>
<!-- Footer Visual -->
<div class="h-1 w-full bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed -z-10 top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-sec-blue/20 blur-[120px] rounded-full"></div>
</div>
</body></html>
